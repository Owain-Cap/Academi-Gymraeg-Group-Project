<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<title>Nouns</title>
<link href="/styles/style.css" rel="stylesheet">
<style>
body {
    background: var(--bg);
    color: var(--text);
}

.nouns-page {
    flex: 1;
    padding: 48px 32px 64px;
    max-width: 1000px;
    margin: 0 auto;
    width: 100%;
}

.page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 32px;
}

.page-header h1 {
    font-family: "Fraunces", serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--text);
    margin: 0;
}

.search-form {
    margin: 0;
}

.search-input {
    padding: 10px 16px;
    border: 1.5px solid var(--border);
    border-radius: 40px;
    font-size: 14px;
    width: 260px;
    font-family: inherit;
    background: white;
}

.search-input:focus {
    outline: none;
    border-color: var(--green-mid);
}

.table-wrapper {
    background: white;
    border-radius: 12px;
    border: 1px solid var(--border);
    overflow-x: auto;
}

.noun-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
}

.noun-table th {
    text-align: left;
    padding: 14px 16px;
    background: #f9fbf8;
    font-weight: 600;
    color: var(--text);
    border-bottom: 1px solid var(--border);
}

.noun-table td {
    padding: 12px 16px;
    border-bottom: 1px solid #edf2ed;
}

.noun-table tr:last-child td {
    border-bottom: none;
}

.edit-link {
    color: var(--green-mid);
    text-decoration: none;
}

.edit-link:hover {
    text-decoration: underline;
}

.empty-row td {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
}
</style>
</head>
<body>

<div class="topbar">
    <a class="nav-logo">Academi <em>Gymraeg</em></a>
</div>

<div class="nouns-page">
    <div class="page-header">
        <h1>Nouns</h1>
        <div style="display: flex; gap: 12px;">
            <form class="search-form" th:action="@{/nouns}" method="get">
                <input type="text" name="search" class="search-input" placeholder="Search Noun" th:value="${search}" />
            </form>
            <a th:href="@{/nouns/edit}" class="btn-add">Add new Noun</a>
        </div>
    </div>

    <div class="table-wrapper">
        <table class="noun-table">
            <thead>
                <tr>
                    <th>Noun ID</th>
                    <th>Welsh</th>
                    <th>English</th>
                    <th>Gender</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="noun : ${nouns}">
                    <td th:text="${noun.nounId}">1</td>
                    <td th:text="${noun.welsh}">cath</td>
                    <td th:text="${noun.english}">cat</td>
                    <td th:text="${noun.gender}">FEMININE</td>
                    <td><a th:href="@{/nouns/edit/{id}(id=${noun.nounId})}" class="edit-link">Edit</a></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<footer>Academi Gymraeg</footer>

</body>
</html>
