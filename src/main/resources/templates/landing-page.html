<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Academi Gymraeg</title>
<style>
* {
	box-sizing: border-box;
	margin: 0;
	padding: 0;
}

body {
	font-family: "DM Sans", sans-serif;
	background: #f5f7f5;
	color: #1e2a3a;
	min-height: 100vh;
	display: flex;
	flex-direction: column;
}

/* NAV */
.topbar {
	display: flex;
	align-items: center;
	justify-content: space-between;
	height: 56px;
	padding: 0 40px;
	background: #1f3d2b;
	border-bottom: 3px solid #2f6f4f;
	flex-shrink: 0;
}

.nav-logo {
	font-family: "Fraunces", serif;
	font-size: 18px;
	font-weight: 700;
	color: #fff;
}

.nav-logo em {
	font-style: italic;
	font-weight: 400;
	color: #b7d6c2;
}

.nav-user {
	font-size: 14px;
	color: rgba(255, 255, 255, 0.65);
}

/* MAIN AREA */
.content {
	display: flex;
	flex: 1;
}

/* HERO */
.hero {
	flex: 1;
	display: flex;
	flex-direction: column;
	justify-content: center;
	padding: 64px 48px;
	background: #ffffff;
	border-right: 1px solid #e3e8e3;
}

.hero-text {
	font-size: 12px;
	letter-spacing: 0.1em;
	text-transform: uppercase;
	color: #4b6b57;
	margin-bottom: 20px;
}

.hero h1 {
	font-family: "Fraunces", serif;
	font-size: 48px;
	font-weight: 700;
	line-height: 1.15;
	margin-bottom: 16px;
}

.hero p {
	font-size: 16px;
	color: #6c757d;
	line-height: 1.6;
	margin-bottom: 40px;
	max-width: 320px;
}

.hero-cta {
	display: inline-block;
	background: #c8102e;
	color: #ffffff;
	padding: 14px 32px;
	border-radius: 40px;
	font-size: 15px;
	font-weight: 600;
	text-decoration: none;
	box-shadow: 0 4px 14px rgba(200, 16, 46, 0.25);
	transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
	align-self: flex-start;
}

.hero-cta:hover {
	background: #a50d26;
	transform: translateY(-2px);
	box-shadow: 0 6px 18px rgba(165, 13, 38, 0.3);
}

/* SECTIONS PANEL */
.sections-panel {
	width: 320px;
	flex-shrink: 0;
	display: flex;
	flex-direction: column;
	padding: 16px;
	gap: 12px;
	background: #f0f4f1;
}

.section-group {
	padding: 24px 24px;
	border-radius: 12px;
	background: #ffffff;
	border: 1px solid #e3e8e3;
}

.student {
	background: #f7fbf8;
}

.teacher {
	background: #f9fcfa;
}

.admin {
	background: #f6f8fd;
}

.section-group h3 {
	font-size: 11px;
	font-weight: 600;
	text-transform: uppercase;
	letter-spacing: 0.1em;
	margin-bottom: 14px;
	color: #5a6b60;
}

.student h3 {
	color: #2f6f4f;
}

.teacher h3 {
	color: #3f7a5a;
}

.admin h3 {
	color: #1a2d6b;
}

.section-link {
	display: block;
	padding: 6px 0;
	color: #1e2a3a;
	text-decoration: none;
	font-size: 14px;
}

.section-link:hover {
	text-decoration: underline;
}

/* FOOTER */
footer {
	text-align: center;
	font-size: 11px;
	color: #6c757d;
	padding: 16px;
	border-top: 1px solid #e3e8e3;
	flex-shrink: 0;
	text-decoration: underline;
	text-decoration-color: #c8102e;
}
</style>
</head>
<body>

	<div class="topbar">
		<div class="nav-logo">
			Academi <em>Gymraeg</em>
		</div>
		<span class="nav-user" th:text="'Helo, ' + ${username}"></span>
	</div>

	<div class="content">
		<div class="hero">
			<p class="hero-text">Croeso yn ôl — Welcome back</p>
			<h1>Welsh, made simple.</h1>
			<p>Practice your Welsh with quick tests and track your progress.</p>
			<a class="hero-cta" th:href="@{/tests/take}">Start a test</a>
		</div>

		<div class="sections-panel">
			<div class="section-group student">
				<h3>Student</h3>
				<a class="section-link" th:href="@{/tests/take}">Take a test</a>
			</div>
			<div class="section-group instructor">
				<h3>Instructor</h3>
				<a class="section-link" th:href="@{/nouns}">View nouns</a>
				<a class="section-link" th:href="@{/nouns/edit}">Add a noun</a>
			</div>
			<div class="section-group admin">
				<h3>Admin</h3>
				<a class="section-link" th:href="@{/admin}">Manage users</a>
				<a class="section-link" th:href="@{/register}">Add user</a>
			</div>
		</div>
	</div>

	<footer>Academi Gymraeg</footer>

</body>
</html>
