<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Academi Gymraeg</title>
<style>
* {
	box-sizing: border-box;
	margin: 0;
	padding: 0;
}

body {
    font-family: "DM Sans", sans-serif;
    color: #1e2a3a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background-image: url('/images/background.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    position: relative;
}

body::before {
	content: "";
	position: fixed;
	inset: 0;
	background: rgba(0, 0, 0, 0.28);
	z-index: 0;
}

.topbar {
	display: flex;
	align-items: center;
	justify-content: space-between;
	height: 56px;
	padding: 0 40px;
	background: rgba(31, 61, 43, 0.95);
	border-bottom: 1px solid rgba(255, 255, 255, 0.15);
	flex-shrink: 0;
	position: relative;
	z-index: 1;
}

.nav-logo {
	font-family: "Fraunces", serif;
	font-size: 18px;
	font-weight: 700;
	color: #fff;
}

.nav-logo em {
	font-style: italic;
	font-weight: 400;
	color: #b7d6c2;
}

.nav-user {
	font-size: 14px;
	color: rgba(255, 255, 255, 0.85);
}

.content {
	display: flex;
	flex: 1;
	background: rgba(255, 255, 255, 0.08);
	position: relative;
	z-index: 1;
}

.hero {
	flex: 1;
	display: flex;
	flex-direction: column;
	justify-content: center;
	padding: 64px 48px;
}

.hero-text {
	font-size: 12px;
	letter-spacing: 0.1em;
	text-transform: uppercase;
	color: #ffffff;
	margin-bottom: 20px;
	text-shadow: 0 2px 8px rgba(0, 0, 0, 0.45);
}

.hero h1 {
	font-family: "Fraunces", serif;
	font-size: 48px;
	font-weight: 700;
	line-height: 1.15;
	margin-bottom: 16px;
	color: #ffffff;
	text-shadow: 0 3px 12px rgba(0, 0, 0, 0.4);
}

.hero p {
	font-size: 16px;
	color: #ffffff;
	line-height: 1.6;
	margin-bottom: 40px;
	max-width: 320px;
	text-shadow: 0 2px 8px rgba(0, 0, 0, 0.45);
}

.hero-cta {
	display: inline-block;
	background: rgba(255, 255, 255, 0.92);
	color: #1e2a3a;
	padding: 14px 32px;
	border-radius: 40px;
	font-size: 15px;
	font-weight: 600;
	text-decoration: none;
	box-shadow: 0 4px 14px rgba(0, 0, 0, 0.15);
	transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
	align-self: flex-start;
}

.hero-cta:hover {
	background: rgba(255, 255, 255, 1);
	transform: translateY(-2px);
	box-shadow: 0 6px 18px rgba(0, 0, 0, 0.2);
}

.sections-panel {
	display: flex;
	flex-direction: column;
	padding: 24px;
	gap: 12px;
	justify-content: center;
}

.section-group {
	width: 280px;
	padding: 24px;
	border-radius: 12px;
	background: rgba(255, 255, 255, 0.88);
	border: 1px solid #e3e8e3;
	backdrop-filter: blur(6px);
	box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
}

.student {
	background: rgba(247, 251, 248, 0.88);
}

.instructor {
	background: rgba(249, 252, 250, 0.88);
}

.admin {
	background: rgba(246, 248, 253, 0.88);
}

.section-group h3 {
	font-size: 11px;
	font-weight: 600;
	text-transform: uppercase;
	letter-spacing: 0.1em;
	margin-bottom: 14px;
	color: #5a6b60;
}

.student h3 {
	color: #2f6f4f;
}

.instructor h3 {
	color: #3f7a5a;
}

.admin h3 {
	color: #1a2d6b;
}

.section-link {
	display: block;
	padding: 6px 0;
	color: #1e2a3a;
	text-decoration: none;
	font-size: 14px;
}

.section-link:hover {
	text-decoration: underline;
}

footer {
	text-align: center;
	font-size: 11px;
	color: rgba(255, 255, 255, 0.85);
	padding: 16px;
	flex-shrink: 0;
	background: rgba(31, 61, 43, 0.95);
	border-top: 1px solid rgba(255, 255, 255, 0.15);
	text-decoration: none;
	position: relative;
	z-index: 1;
}
</style>
</head>
<body>

	<div class="topbar">
		<div class="nav-logo">
			Academi <em>Gymraeg</em>
		</div>
		<span class="nav-user" th:text="'Helo, ' + ${username}"></span>
	</div>

	<div class="content">
		<div class="hero">
			<p class="hero-text">Croeso yn ôl — Welcome back</p>
			<h1>Welsh, made simple.</h1>
			<p>Practice your Welsh with quick tests and track your progress.</p>
			<a class="hero-cta" th:href="@{/tests/take}">Start a test</a>
		</div>

		<div class="sections-panel">
			<div class="section-group student">
				<h3>Student</h3>
				<a class="section-link" th:href="@{/tests/take}">Take a test</a>
			</div>
			<div class="section-group instructor">
				<h3>Instructor</h3>
				<a class="section-link" th:href="@{/nouns}">View nouns</a>
				<a class="section-link" th:href="@{/nouns/edit}">Add a noun</a>
			</div>
			<div class="section-group admin">
				<h3>Admin</h3>
				<a class="section-link" th:href="@{/admin}">Manage users</a>
				<a class="section-link" th:href="@{/register}">Add user</a>
			</div>
		</div>
	</div>

	<footer>Academi Gymraeg</footer>

</body>
</html>
