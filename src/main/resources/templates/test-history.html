<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Test History</title>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<link href="/styles/style.css" rel="stylesheet">
<style>
:root {
	--green-dark: #1f3d2b;
	--green-mid: #2d5a27;
	--green-light: #b7d6c2;
	--red: #dc2626;
	--red-dark: #b91c1c;
	--text: #1e2a3a;
	--muted: #6c757d;
	--surface: #fff;
	--bg: #f4f6f3;
	--border: #e2e8f0;
}

* {
	box-sizing: border-box;
	margin: 0;
	padding: 0;
}

body {
	font-family: "DM Sans", sans-serif;
	background: var(--bg);
	color: var(--text);
	min-height: 100vh;
	display: flex;
	flex-direction: column;
}

.topbar {
	display: flex;
	align-items: center;
	justify-content: space-between;
	height: 56px;
	padding: 0 40px;
	background: rgba(31, 61, 43, 0.95);
	border-bottom: 1px solid rgba(255, 255, 255, 0.15);
	flex-shrink: 0;
}

.nav-logo {
	font-family: "Fraunces", serif;
	font-size: 18px;
	font-weight: 700;
	color: #fff;
	text-decoration: none;
}

.nav-logo em {
	font-style: italic;
	font-weight: 400;
	color: var(--green-light);
}

.page {
	flex: 1;
	display: flex;
	align-items: flex-start;
	justify-content: center;
	padding: 48px 24px 64px;
}

.container {
	width: 100%;
	max-width: 860px;
}

.page-heading {
	font-family: "Fraunces", serif;
	font-size: 32px;
	font-weight: 700;
	color: var(--text);
	margin-bottom: 4px;
}

.page-message {
	font-size: 14px;
	color: var(--muted);
	margin-bottom: 32px;
}

/* GRID */
.results-grid {
	display: grid;
	grid-template-columns: repeat(3, 1fr);
	gap: 16px;
}

/* RESULT CARD */
.result-card {
	background: rgba(247, 251, 248, 0.95);
	border-radius: 12px;
	padding: 20px 24px;
	border: 1px solid #e3e8e3;
	box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
	display: flex;
	flex-direction: column;
	gap: 8px;
}

.result-card .test-id {
	font-size: 11px;
	font-weight: 600;
	text-transform: uppercase;
	letter-spacing: 0.1em;
	color: #2f6f4f;
}

.result-card .test-date {
	font-size: 13px;
	color: var(--muted);
}

.result-card .divider {
	border: none;
	border-top: 1px solid var(--border);
	margin: 4px 0;
}

.result-card .grade {
	display: inline-block;
	padding: 4px 12px;
	border-radius: 40px;
	font-size: 13px;
	font-weight: 600;
	align-self: flex-start;
}

.grade-high {
	background: #e8f5e9;
	color: var(--green-mid);
}

.grade-mid {
	background: #fff8e1;
	color: #92610a;
}

.grade-low {
	background: #ffebee;
	color: var(--red-dark);
}

.grade-row {
    display: flex;
    align-items: center;
    gap: 85px;
    margin-top: 8px;
}

.grade-button {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 40px;
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    background-color:#ebeff5;
    color: var(--text);
    transition: background 0.2s, color 0.2s;
}

.grade-button:hover {
    background-color: var(--border);
    color: var(--text);
}

/* EMPTY STATE */
.empty {
	font-size: 14px;
	color: var(--muted);
	text-align: center;
	padding: 16px 0;
}

/* BACK LINK */
.back-link {
	margin-top: 24px;
	text-align: center;
}

.back-link a {
	font-size: 14px;
	color: var(--muted);
	text-decoration: none;
	font-weight: 500;
	transition: color 0.2s;
}

.back-link a:hover {
	color: var(--text);
	text-decoration: underline;
}

footer {
	text-align: center;
	font-size: 11px;
	color: rgba(255, 255, 255, 0.85);
	padding: 16px;
	flex-shrink: 0;
	background: rgba(31, 61, 43, 0.95);
	border-top: 1px solid rgba(255, 255, 255, 0.15);
}
</style>
</head>

<body>

		<div class="topbar">
		<div class="nav-logo">
			<a th:href="@{/}" class="nav-logo">Academi <em>Gymraeg</em></a>
		</div>

		<div class="nav-right">
			<span class="nav-user" th:text="'Helo, ' + ${username}"></span>

			<form th:action="@{/logout}" method="post">
				<button type="submit" class="logout-btn">Logout</button>
			</form>
		</div>
	</div>

	<div class="page">
		<div class="container">

			<h1 class="page-heading">Test History</h1>
			<p class="page-message">All completed tests.</p>

			<div th:if="${tests.isEmpty()}" class="empty">You have not
				completed any tests yet.</div>

			<div th:unless="${tests.isEmpty()}" class="results-grid">
				<div th:each="test : ${tests}" class="result-card">
					<div class="test-id" th:text="'Test #' + ${test.testId}"></div>
					<div class="test-date"
						th:text="${#temporals.format(test.createdAt, 'dd MMM yyyy, HH:mm')}"></div>
					<hr class="divider" />
					<div class="grade-row">
						<span th:text="${test.result + '%'}"
							th:classappend="${test.result >= 70} ? 'grade grade-high' :
						                 (${test.result >= 40} ? 'grade grade-mid' : 'grade grade-low')">
						</span> 
						<a class="grade-button" th:href="@{'/review-test/' + ${test.testId}}" >Review Test</a>
					</div>
				</div>
			</div>

			<div class="back-link">
				<a th:href="@{/}">Back to dashboard</a>
			</div>

		</div>
	</div>

	<footer>Academi Gymraeg</footer>

</body>
</html>
