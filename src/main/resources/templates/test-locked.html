<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Test In Progress</title>
<style>
body {
	font-family: Arial, sans-serif;
	margin: 30px;
	background-color: #f7f7f7;
	color: #1e2a3a;
}

.container {
	max-width: 700px;
	margin: 60px auto;
	background: white;
	border: 1px solid #ddd;
	border-radius: 10px;
	padding: 32px;
	text-align: center;
	box-shadow: 0 8px 24px rgba(0,0,0,0.08);
}

h1 {
	margin-bottom: 16px;
}

p {
	margin-bottom: 14px;
	line-height: 1.5;
	color: #555;
}

.actions {
	margin-top: 24px;
}

.button {
	display: inline-block;
	padding: 10px 18px;
	border-radius: 6px;
	background: #1f3d2b;
	color: white;
	text-decoration: none;
	font-weight: bold;
}

.button:hover {
	background: #2d5a27;
}
</style>
</head>
<body>
	<div class="container">
		<h1>Test In Progress</h1>
		<p th:text="${message}">You cannot access previous tests while a test is in progress.</p>
		<p>
			To keep the test fair, past tests and answers are locked until your current test is submitted.
		</p>

		<div class="actions">
			<a class="button" th:href="@{/tests/take/{testId}(testId=${activeTestId})}">
				Return to Current Test
			</a>
		</div>
	</div>
</body>
</html>
