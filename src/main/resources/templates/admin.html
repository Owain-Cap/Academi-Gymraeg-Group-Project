<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Admin Dashboard</title>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
<!-- Can change the inline css later to dedicated file -->
<link href="/styles/style.css" rel="stylesheet">
<link href="/css/admin.css" rel="stylesheet">
<style>
body {
    background: var(--bg);
    color: var(--text);
}

.admin-page {
    flex: 1;
    padding: 48px 32px 64px;
    max-width: 1000px;
    margin: 0 auto;
    width: 100%;
}
</style>
</head>
<body>
	<div class="topbar">
	    <a class="nav-logo" th:href="@{/}" style="cursor: pointer;">Academi <em>Gymraeg</em></a>
	</div>
	
	<div class="admin-page section-group" style="max-width: 1200px; width: 95%; margin: 40px auto; padding: 40px; box-sizing: border-box;">
		<!-- Admin page used for managing all users on the application -->
		<div class="page-header">
			<h1>Admin - Manage Users</h1>
			
			<div style="margin-bottom: 20px; display: flex; gap: 15px; align-items: center;">
				<!-- Role Filter Dropdown -->
				<select id="roleFilter" class="text-input role-filter" onchange="filterUsersByRole()" style="width: auto; min-width: 150px; cursor: pointer;">
					<option value="All">All Roles</option>
					<option value="Student">Student</option>
					<option value="Instructor">Instructor</option>
					<option value="System Admin">System Admin</option>
				</select>
				
				<a th:href="@{/register}">
					<button type="button" class="btn-add">Add New User</button>
				</a>
			</div>
		</div>

	<!-- 
        Table displaying all users. 
        Thymeleaf's th:each is used to loop through the "users" list 
        passed from the AdminController and create a table row for each user.
    -->
	<div class="table-wrapper">
		<table id="userTable">
			<thead>
				<tr>
					<th>ID</th>
					<th>Username</th>
					<th>First Name</th>
					<th>Last Name</th>
					<th>Email</th>
					<th>Role</th>
					<th>Actions</th>
				</tr>
			</thead>
			<tbody>
			<tr th:each="user : ${users}">
				<td th:text="${user.userId}">ID</td>
				<td th:text="${user.username}">Username</td>
				<td th:text="${user.firstName}">First Name</td>
				<td th:text="${user.lastName}">Last Name</td>
				<td th:text="${user.email}">Email</td>
				<td
					th:text="${user.isAdmin == T(uk.ac.bangor.cs.group2.academicymraeg.models.User.IsAdmin).YES ? 'System Admin' : 
               (user.isInstructor == T(uk.ac.bangor.cs.group2.academicymraeg.models.User.IsInstructor).YES ? 'Instructor' : 'Student')}">Role</td>
					<td class="actions">
						<a class="table-link" th:href="@{/admin/users/edit/{id}(id=${user.userId})}">
							Edit
						</a>
						<button type="button"
							th:data-action="@{/admin/users/delete/{id}(id=${user.userId})}"
							th:data-username="${user.username}"
							onclick="openDeleteModal(this)"
							class="btn-delete"
							style="background-color: transparent; color: #f44336; border: none; cursor: pointer; font-size: 14px; font-family: inherit; font-weight: 500;">
							Delete</button>
					</td>
				</tr>
			</tbody>
		</table>
	</div>
	
	<div class="back-link" style="margin-top: 30px; text-align: left;">
		<a th:href="@{/}">&larr; Return to Homepage</a>
	</div>
	
	<!-- Delete Confirmation Modal -->
	<div id="deleteModal" class="modal">
		<div class="modal-content">
			<div class="modal-header">
				<h2>Confirm Deletion</h2>
				<span class="close" onclick="closeDeleteModal()">&times;</span>
			</div>
			<div class="modal-body">
				<p>
					Are you sure you want to delete user <strong id="deleteUserName"></strong>?
				</p>
				<p style="color: #f44336; font-size: 0.9em; margin-top: 10px;">This
					action cannot be undone.</p>
			</div>
			<div class="modal-footer">
				<button type="button" onclick="closeDeleteModal()"
					class="btn-cancel">Cancel</button>
					<!-- th:action is required here so Thymeleaf injects the hidden CSRF token into the form.
				     Without it, Spring Security will reject the POST request with a 403 Forbidden error.
				     The actual action URL is overwritten by admin.js at the point when the modal opens. -->
				<form id="confirmDeleteForm" th:action="@{/}" method="post" style="margin: 0;">
					<button type="submit" class="btn-confirm-delete">Delete
						User</button>
				</form>
			</div>
		</div>
	</div>
 </div>
<footer>Academi Gymraeg</footer>

	<script th:src="@{/js/admin.js}"></script>
</body>
</html>
