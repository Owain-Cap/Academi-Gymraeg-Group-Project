<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Admin Dashboard</title>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<!-- Can change the inline css later to dedicated file -->
<style>
body {
	font-family: Arial, sans-serif;
	margin: 20px;
}

table {
	border-collapse: collapse;
	width: 100%;
	margin-top: 20px;
}

th, td {
	border: 1px solid #ddd;
	padding: 8px;
	text-align: left;
}

th {
	background-color: #f2f2f2;
}

h1 {
	color: #333;
}

.actions {
	display: flex;
	gap: 10px;
}

button {
	padding: 5px 10px;
	cursor: pointer;
}
</style>
</head>
<body>
	<!-- Admin page used for managing all users on the application -->
	<h1>Admin Dashboard - Manage Users</h1>

	<div style="margin-bottom: 20px;">
		<a th:href="@{/register}">
			<button type="button"
				style="background-color: #4CAF50; color: white; padding: 10px 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">Add
				New User</button>
		</a>
	</div>

	<!-- 
        Table displaying all users. 
        Thymeleaf's th:each is used to loop through the "users" list 
        passed from the AdminController and create a table row for each user.
    -->
	<table>
		<thead>
			<tr>
				<th>ID</th>
				<th>Username</th>
				<th>First Name</th>
				<th>Last Name</th>
				<th>Email</th>
				<th>Role</th>
				<th>Actions</th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="user : ${users}">
				<td th:text="${user.userId}">ID</td>
				<td th:text="${user.username}">Username</td>
				<td th:text="${user.firstName}">First Name</td>
				<td th:text="${user.lastName}">Last Name</td>
				<td th:text="${user.email}">Email</td>
				<td
					th:text="${user.isAdmin == T(uk.ac.bangor.cs.group2.academicymraeg.models.User.IsAdmin).YES ? 'System Admin' : 
               (user.isInstructor == T(uk.ac.bangor.cs.group2.academicymraeg.models.User.IsInstructor).YES ? 'Instructor' : 'Student')}">Role</td>
				<td class="actions"><a
					th:href="@{/admin/users/edit/{id}(id=${user.userId})}"> <!-- Send to exact users edit form -->
						<button type="button">Edit</button>
				</a>
					<form th:action="@{/admin/users/delete/{id}(id=${user.userId})}" method="post" onsubmit="return confirm('Are you sure you want to delete this user?');" style="margin: 0;">
						<button type="submit" style="background-color: #f44336; color: white; border: none; border-radius: 4px; padding: 5px 10px; cursor: pointer;">Delete</button>
					</form>
				</td>
			</tr>
		</tbody>
	</table>
</body>
</html>
