<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Admin Dashboard</title>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	<!-- Google Fonts for the application, DM Sans for body text and Fraunces for headings -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,400&display=swap"
		rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/admin.css}" />
</head>

<body>
	<!-- Topbar Navigation, same as the navigation menu found on the landing page -->
	<div class="topbar">
		<div class="nav-logo">
			Academi <em>Gymraeg</em>
		</div>
		<div class="nav-right">
			<span class="nav-user" th:text="'Helo, ' + ${username}"></span>
			<a th:href="@{/}" class="btn-home">Return to Homepage</a>
		</div>
	</div>

	<!-- Main content area establishing the grid/flex context and holding the glass panel -->
	<div class="content-wrapper">
		<!-- Container that houses the admin dashboard data -->
		<div class="dashboard-panel">

			<!-- Admin page used for managing all users on the application -->
			<div class="dashboard-header">
				<h1>Admin Dashboard - Manage Users</h1>
			</div>

			<div class="action-bar">
				<a th:href="@{/register}">
					<button type="button" class="btn-add">Add New User</button>
				</a>

				<div class="filter-container">
					<label for="roleFilter">Filter by Role:</label>
					<select id="roleFilter" onchange="filterUsersByRole()" class="filter-select">
						<option value="All">All Roles</option>
						<option value="System Admin">System Admin</option>
						<option value="Instructor">Instructor</option>
						<option value="Student">Student</option>
					</select>
				</div>
			</div>

			<!-- 
        Table displaying all users. 
        Thymeleaf's th:each is used to loop through the "users" list 
        passed from the AdminController and create a table row for each user.
    -->
			<table>
				<thead>
					<tr>
						<th>ID</th>
						<th>Username</th>
						<th>First Name</th>
						<th>Last Name</th>
						<th>Email</th>
						<th>Role</th>
						<th>Actions</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="user : ${users}">
						<td th:text="${user.userId}">ID</td>
						<td th:text="${user.username}">Username</td>
						<td th:text="${user.firstName}">First Name</td>
						<td th:text="${user.lastName}">Last Name</td>
						<td th:text="${user.email}">Email</td>
						<!-- Checks if the user is an admin or instructor and displays the appropriate role -->
						<td
							th:text="${user.isAdmin == T(uk.ac.bangor.cs.group2.academicymraeg.models.User.IsAdmin).YES ? 'System Admin' : 
               (user.isInstructor == T(uk.ac.bangor.cs.group2.academicymraeg.models.User.IsInstructor).YES ? 'Instructor' : 'Student')}">
							Role</td>
						<td class="actions"><a th:href="@{/admin/users/edit/{id}(id=${user.userId})}">
								<!-- Send to exact users edit form -->
								<button type="button" class="btn-edit">Edit</button>
							</a>
							<!-- Send to exact users delete form -->
							<button type="button" th:data-action="@{/admin/users/delete/{id}(id=${user.userId})}"
								th:data-username="${user.username}" onclick="openDeleteModal(this)"
								class="btn-delete">Delete</button>
						</td>
					</tr>
				</tbody>
			</table>

		</div>
	</div>

	<!-- Delete Confirmation Modal -->
	<div id="deleteModal" class="modal">
		<div class="modal-content">
			<div class="modal-header">
				<h2>Confirm Deletion</h2>
				<span class="close" onclick="closeDeleteModal()">&times;</span>
			</div>
			<div class="modal-body">
				<p>
					Are you sure you want to delete user <strong id="deleteUserName"></strong>?
				</p>
				<p style="color: #f44336; font-size: 0.9em; margin-top: 10px;">This
					action cannot be undone.</p>
			</div>
			<div class="modal-footer">
				<button type="button" onclick="closeDeleteModal()" class="btn-cancel">Cancel</button>
				<!-- th:action is required here so Thymeleaf injects the hidden CSRF token into the form.
				     Without it, Spring Security will reject the POST request with a 403 Forbidden error.
				     The actual action URL is overwritten by admin.js at the point when the modal opens. -->
				<form id="confirmDeleteForm" th:action="@{/}" method="post" style="margin: 0;">
					<button type="submit" class="btn-confirm-delete">Delete
						User</button>
				</form>
			</div>
		</div>
	</div>

	<script th:src="@{/js/admin.js}"></script>
</body>

</html>
