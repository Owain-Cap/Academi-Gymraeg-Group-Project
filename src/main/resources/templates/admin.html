<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Admin Dashboard</title>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<!-- Can change the inline css later to dedicated file -->
<link href="/styles/style.css" rel="stylesheet">
<style>
body {
	background: var(--bg);
	color: var(--text);
}

.admin-page {
	flex: 1;
	padding: 48px 32px 64px;
	max-width: 1000px;
	margin: 0 auto;
	width: 100%;
}
.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 1000;
    justify-content: center;
    align-items: center;
}

.modal.active {
    display: flex;
}

.modal-content {
    background: white;
    border-radius: 12px;
    padding: 32px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
}

.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
}

.modal-header h2 {
    font-family: "Fraunces", serif;
    font-size: 22px;
}

.close {
    cursor: pointer;
    font-size: 20px;
    color: var(--muted);
}

.modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    margin-top: 24px;
}

.btn-cancel {
    padding: 10px 20px;
    border-radius: 40px;
    border: 1px solid var(--border);
    background: #eef2f0;
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
}

.btn-confirm-delete {
    padding: 10px 20px;
    border-radius: 40px;
    border: none;
    background: #dc2626;
    color: white;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
}
</style>
</head>
<body>
	<div class="topbar">
		<div class="nav-logo">
			Academi <em>Gymraeg</em>
		</div>

		<div class="nav-right">
			<span class="nav-user" th:text="'Helo, ' + ${username}"></span>

			<form th:action="@{/logout}" method="post">
				<button type="submit" class="logout-btn">Logout</button>
			</form>
		</div>
	</div>
	<div class="admin-page">
		<!-- Admin page used for managing all users on the application -->
		<div class="page-header">
			<h1>Admin - Manage Users</h1>

			<div style="margin-bottom: 20px;">
				<a th:href="@{/register}">
					<button type="button" class="btn-add">Add New User</button>
				</a>
			</div>
		</div>

		<!-- 
        Table displaying all users. 
        Thymeleaf's th:each is used to loop through the "users" list 
        passed from the AdminController and create a table row for each user.
    -->
		<table>
			<thead>
				<tr>
					<th>ID</th>
					<th>Username</th>
					<th>First Name</th>
					<th>Last Name</th>
					<th>Email</th>
					<th>Role</th>
					<th>Actions</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="user : ${users}">
					<td th:text="${user.userId}">ID</td>
					<td th:text="${user.username}">Username</td>
					<td th:text="${user.firstName}">First Name</td>
					<td th:text="${user.lastName}">Last Name</td>
					<td th:text="${user.email}">Email</td>
					<td
						th:text="${user.isAdmin == T(uk.ac.bangor.cs.group2.academicymraeg.models.User.IsAdmin).YES ? 'System Admin' : 
               (user.isInstructor == T(uk.ac.bangor.cs.group2.academicymraeg.models.User.IsInstructor).YES ? 'Instructor' : 'Student')}">Role</td>
					<td class="actions"><a
						th:href="@{/admin/users/edit/{id}(id=${user.userId})}"> <!-- Send to exact users edit form -->
							<button type="button">Edit</button>
					</a>
						<button type="button"
							th:data-action="@{/admin/users/delete/{id}(id=${user.userId})}"
							th:data-username="${user.username}"
							onclick="openDeleteModal(this)"
							style="background-color: #f44336; color: white; border: none; border-radius: 4px; padding: 5px 10px; cursor: pointer;">
							Delete</button></td>
				</tr>
			</tbody>
		</table>
		<!-- Delete Confirmation Modal -->
		<div id="deleteModal" class="modal">
			<div class="modal-content">
				<div class="modal-header">
					<h2>Confirm Deletion</h2>
					<span class="close" onclick="closeDeleteModal()">&times;</span>
				</div>
				<div class="modal-body">
					<p>
						Are you sure you want to delete user <strong id="deleteUserName"></strong>?
					</p>
					<p style="color: #f44336; font-size: 0.9em; margin-top: 10px;">This
						action cannot be undone.</p>
				</div>
				<div class="modal-footer">
					<button type="button" onclick="closeDeleteModal()"
						class="btn-cancel">Cancel</button>
					<!-- th:action is required here so Thymeleaf injects the hidden CSRF token into the form.
				     Without it, Spring Security will reject the POST request with a 403 Forbidden error.
				     The actual action URL is overwritten by admin.js at the point when the modal opens. -->
					<form id="confirmDeleteForm" th:action="@{/}" method="post"
						style="margin: 0;">
						<button type="submit" class="btn-confirm-delete">Delete
							User</button>
					</form>
				</div>
			</div>
		</div>
	</div>
	<footer>Academi Gymraeg</footer>

	<script th:src="@{/js/admin.js}"></script>
</body>
</html>
