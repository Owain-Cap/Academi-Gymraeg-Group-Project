<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Add / Edit User</title>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
}

body {
	font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
	background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
	color: #1e2a3a;
	padding: 2rem 1.5rem;
	line-height: 1.5;
	display: flex;
	flex-direction: column;
	align-items: center;
	min-height: 100vh;
}

h2 {
	color: #1e4a2f;
	font-size: 1.8rem;
	font-weight: 600;
	border-bottom: 3px solid #dc2626;
	padding-bottom: 0.75rem;
	margin-bottom: 1.5rem;
	margin-top: 0;
	width: 100%;
	text-align: center;
	letter-spacing: -0.3px;
}

.messages {
	width: 100%;
	max-width: 560px;
	margin-bottom: 1.5rem;
}

.messages p {
	padding: 0.875rem 1.25rem;
	border-radius: 12px;
	font-weight: 500;
	margin-bottom: 0.75rem;
}

.messages p[style*="color: green"] {
	background-color: #e8f5e9;
	border-left: 4px solid #2e7d32;
	color: #1e4a2f !important;
}

.messages p[style*="color: red"] {
	background-color: #ffebee;
	border-left: 4px solid #dc2626;
	color: #b91c1c !important;
}

form {
	background-color: #ffffff;
	padding: 2rem 2rem 2rem 2rem;
	border-radius: 24px;
	width: 100%;
	max-width: 560px;
	box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08), 0 2px 4px
		rgba(0, 0, 0, 0.02);
	box-sizing: border-box;
	transition: transform 0.2s ease, box-shadow 0.2s ease;
}

form:hover {
	box-shadow: 0 20px 32px rgba(0, 0, 0, 0.1);
}

p {
	margin-bottom: 1.25rem;
}

input[type="text"], input[type="email"], input[type="password"] {
	width: 100%;
	padding: 0.75rem 1rem;
	margin-top: 0.375rem;
	border: 1.5px solid #e2e8f0;
	border-radius: 12px;
	box-sizing: border-box;
	font-size: 0.95rem;
	font-family: inherit;
	transition: all 0.2s ease;
	background-color: #fefefe;
}

input[type="text"]:focus, input[type="email"]:focus, input[type="password"]:focus
	{
	outline: none;
	border-color: #dc2626;
	box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1);
	background-color: #ffffff;
}

input[type="checkbox"] {
	width: 1.1rem;
	height: 1.1rem;
	margin-right: 0.5rem;
	cursor: pointer;
	accent-color: #dc2626;
}

label {
	font-size: 0.85rem;
	font-weight: 600;
	color: #2d3e50;
	display: inline-block;
	margin-bottom: 0.25rem;
	letter-spacing: 0.3px;
}

p:has(input[type="checkbox"]) {
	display: flex;
	align-items: center;
	margin-bottom: 0.75rem;
}

p:has(input[type="checkbox"]) label {
	margin-bottom: 0;
	font-weight: 500;
	cursor: pointer;
}

.submit-row {
	text-align: center;
	margin-top: 1.75rem;
	margin-bottom: 0.5rem;
}

input[type="submit"] {
	background-color: #dc2626;
	color: white;
	padding: 0.85rem 2rem;
	border: none;
	border-radius: 40px;
	cursor: pointer;
	font-size: 1rem;
	font-weight: 600;
	transition: all 0.25s ease;
	min-width: 180px;
	letter-spacing: 0.3px;
	box-shadow: 0 2px 8px rgba(220, 38, 38, 0.25);
}

input[type="submit"]:hover {
	background-color: #b91c1c;
	transform: translateY(-1px);
	box-shadow: 0 6px 14px rgba(185, 28, 28, 0.3);
}

input[type="submit"]:active {
	transform: translateY(1px);
}

a {
	text-decoration: none;
	color: #1e6b3e;
	font-weight: 600;
	transition: color 0.2s;
}

a:hover {
	text-decoration: underline;
	color: #0f4a2a;
}

.back-link {
	width: 100%;
	max-width: 560px;
	margin-top: 1.5rem;
	text-align: center;
	padding: 0.5rem;
}

.back-link a {
	display: inline-block;
	background: #f1f5f9;
	padding: 0.6rem 1.5rem;
	border-radius: 40px;
	font-size: 0.9rem;
	font-weight: 500;
	color: #2c5a3b;
	transition: all 0.2s;
}

.back-link a:hover {
	background: #e6edf4;
	text-decoration: none;
	transform: translateX(-2px);
}

.name-row {
	display: flex;
	gap: 1rem;
	margin-bottom: 1.25rem;
}

.name-row p {
	flex: 1;
	margin-bottom: 0;
}

.password-hint {
	font-size: 0.7rem;
	color: #6c757d;
	margin-top: 0.25rem;
	margin-left: 0.25rem;
	display: inline-block;
}

@media ( max-width : 550px) {
	body {
		padding: 1.25rem;
	}
	form {
		padding: 1.5rem;
	}
	h2 {
		font-size: 1.5rem;
	}
	.name-row {
		flex-direction: column;
		gap: 0;
	}
	.name-row p {
		margin-bottom: 1.25rem;
	}
	input[type="submit"] {
		width: 100%;
		padding: 0.8rem;
	}
}
</style>

</head>

<body>
	<h2 th:text="${user.userId == 0 ? 'Add New User' : 'Edit User'}">Add
		Or Edit A User</h2>

	<div class="messages">
		<p th:if="${successMessage}" th:text="${successMessage}"
			style="color: green;"></p>
		<p th:if="${errorMessage}" th:text="${errorMessage}"
			style="color: red;"></p>
	</div>

	<form th:action="@{/register}" th:object="${user}" method="post">

		<!-- Hidden field for User ID to support updating existing users -->
		<input type="hidden" th:field="*{userId}" />

		<div class="name-row">
			<p>
				First Name: <input type="text" th:field="*{firstName}" required />
			</p>
			<p>
				Last Name: <input type="text" th:field="*{lastName}" required />
			</p>
		</div>

		<p>
			Username: <input type="text" th:field="*{username}" required />
		</p>
		<p>
			Email: <input type="email" th:field="*{email}" required />
		</p>
		<p>
			Password:<input type="password" th:field="*{passwordHash}"
				th:required="${user.userId == 0}" /> <span
				th:if="${user.userId != 0}" class="password-hint">(Leave
				blank to keep current)</span> <span th:if="${user.userId == 0}"
				class="password-hint">(Required for new user)</span>
		</p>

		<p>Roles:</p>
		<p>
			<label> <input type="checkbox" th:field="*{isInstructor}"
				value="YES" /> Instructor
			</label>
		</p>
		<p>
			<label> <input type="checkbox" th:field="*{isAdmin}"
				value="YES" /> System Admin
			</label>
		</p>

		<div class="submit-row">
			<input type="submit"
				th:value="${user.userId == 0 ? 'Add User' : 'Update User'}" />
			<!-- Checks if userID is 0 to determine if it's a new user or an existing user -->
		</div>

	</form>

	<p class="back-link">
		<a th:href="@{/admin}">Back to Dashboard</a>
	</p>
</body>

</html>
