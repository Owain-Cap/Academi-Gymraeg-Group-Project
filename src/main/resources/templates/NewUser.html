<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Add / Edit User</title>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
</head>

<body>
	<h2 th:text="${user.userId == null ? 'Add New User' : 'Edit User'}">Add
		New User</h2>

	<p th:if="${successMessage}" th:text="${successMessage}"
		style="color: green;"></p>
	<p th:if="${errorMessage}" th:text="${errorMessage}"
		style="color: red;"></p>

	<form th:action="@{/register}" th:object="${user}" method="post">

		<!-- Hidden field for User ID to support updating existing users -->
		<input type="hidden" th:field="*{userId}" />

		<p>
			Username: <input type="text" th:field="*{username}" required />
		</p>
		<p>
			Email: <input type="email" th:field="*{email}" required />
		</p>
		<p>
			First Name: <input type="text" th:field="*{firstName}" required />
		</p>
		<p>
			Last Name: <input type="text" th:field="*{lastName}" required />
		</p>
		<p>
			Password: <input type="password" th:field="*{passwordHash}"
				th:required="${user.userId == null}" />
		</p>
		<p>
			Role: <select th:field="*{role}">
				<option value="STUDENT">Student</option>
				<option value="INSTRUCTOR">Instructor</option>
				<option value="SYSTEM_ADMIN">System Admin</option>
			</select>
		</p>

		<p>
			<input type="submit"
				th:value="${user.userId == null ? 'Add User' : 'Update User'}" />
				<!-- Checks if userID is null to determine if it's a new user or an existing user-->
		</p>


	</form>

	<p>
		<a th:href="@{/admin}">Back to Dashboard</a>
	</p>
</body>

</html>
