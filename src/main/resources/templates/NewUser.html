<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add New User</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
</head>
<body>
    <h2>Add New User</h2>

    <p th:if="${successMessage}" th:text="${successMessage}" />
    <p th:if="${errorMessage}" th:text="${errorMessage}" />

    <form th:action="@{/register}" th:object="${user}" method="post">

        <p>Username: <input type="text" th:field="*{username}" required /></p>
        <p>Email: <input type="email" th:field="*{email}" required /></p>
        <p>First Name: <input type="text" th:field="*{firstName}" required /></p>
        <p>Last Name: <input type="text" th:field="*{lastName}" required /></p>
        <p>Password: <input type="password" th:field="*{passwordHash}" required /></p>
        <p>Role:
            <select th:field="*{role}">
                <option value="STUDENT">Student</option>
                <option value="INSTRUCTOR">Instructor</option>
                <option value="SYSTEM_ADMIN">System Admin</option>
            </select>
        </p>

        <p><input type="submit" value="Add User" /></p>

    </form>
</body>
</html>
