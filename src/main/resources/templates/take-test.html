<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<link href="/styles/style.css" rel="stylesheet">
<title>Academi Gymraeg — Take Test</title>
<style>
body {
	background-image: url('/images/backgroundtest2.jpg');
}
.topbar {
	border-bottom: 3px solid #2f6f4f;
}

.main {
	flex: 1;
	background: rgba(255, 255, 255, 0.25);
	display: flex;
	justify-content: center;
	padding: 48px 24px;
}

.container {
	width: 100%;
	max-width: 680px;
}

.page-label {
	font-size: 12px;
	letter-spacing: 0.1em;
	text-transform: uppercase;
	color: #1f3d2b;
	margin-bottom: 12px;
}

.page-title {
	font-family: "Fraunces", serif;
	font-size: 36px;
	font-weight: 700;
	margin-bottom: 8px;
}

.meta {
	font-size: 13px;
	color: #4b6b57;
	margin-bottom: 32px;
	display: flex;
	gap: 20px;
}

.meta strong {
	color: #1e2a3a;
}

.error-message {
	background: rgba(178, 34, 34, 0.1);
	border: 1px solid rgba(178, 34, 34, 0.3);
	border-radius: 8px;
	padding: 12px 16px;
	color: #b22222;
	font-weight: 600;
	font-size: 14px;
	margin-bottom: 20px;
}

.question-card {
	background: rgba(255, 255, 255, 0.82);
	border: 1px solid #e3e8e3;
	border-radius: 12px;
	padding: 24px;
	margin-bottom: 16px;
	backdrop-filter: blur(4px);
	transition: border-color 0.2s;
}

.question-card.unanswered {
	border: 2px solid #b22222;
}

.question-number {
	font-size: 11px;
	font-weight: 600;
	text-transform: uppercase;
	letter-spacing: 0.1em;
	color: #2f6f4f;
	margin-bottom: 8px;
}

.question-text {
	font-size: 16px;
	font-weight: 600;
	color: #1e2a3a;
	margin-bottom: 16px;
}

.option {
	margin: 10px 0;
}

.option label {
	display: flex;
	align-items: center;
	gap: 10px;
	font-size: 14px;
	cursor: pointer;
}

.option input[type="radio"] {
	accent-color: #2f6f4f;
	width: 16px;
	height: 16px;
}

.text-answer {
	margin-top: 4px;
}

.skip-row {
	margin-top: 10px;
}

.skip-link {
	color: #4b6b57;
	font-size: 12px;
	font-weight: 500;
	text-decoration-line: underline;
	text-decoration-style: dotted;
	text-underline-offset: 2px;
	cursor: pointer;
}

.skip-link:hover {
	color: #1f3d2b;
}

.skip-option {
	color: #4b6b57;
	font-size: 13px;
	text-decoration-line: underline;
	text-decoration-style: dotted;
	text-underline-offset: 2px;
}

.submit-row {
	margin-top: 24px;
	display: flex;
	justify-content: flex-end;
}
footer {
	border-top: 3px solid #2f6f4f;
	text-decoration: underline;
	text-decoration-color: rgba(255, 255, 255, 0.4);
}
</style>
</head>
<body>

	<div class="topbar">
		<div class="nav-logo">
			Academi <em>Gymraeg</em>
		</div>
	</div>

	<div class="main">
		<div class="container">

			<p class="page-label">Cymraeg — Welsh Test</p>
			<h1 class="page-title">Take a Test</h1>

			<div class="meta">
				<div><strong>Test ID:</strong> <span th:text="${test.testId}"></span></div>
				<div><strong>User:</strong> <span th:text="${test.username}"></span></div>
			</div>

			<div th:if="${errorMessage}" class="error-message">
				<span th:text="${errorMessage}"></span>
			</div>

			<form th:action="@{/tests/take/{testId}(testId=${test.testId})}"
				th:object="${testSubmissionForm}" method="post"
				onsubmit="return validateBeforeSubmit();">

				<div th:each="question, stat : ${questions}" class="question-card"
					th:attr="id=|question-card-${stat.index}|">

					<div class="question-number">
						Question <span th:text="${question.position}"></span>
					</div>
					<div class="question-text" th:text="${question.question}"></div>

					<div th:if="${question.questionType.name() == 'GENDER'}">
						<div class="option">
							<label>
								<input type="radio"
									th:name="|answers[${stat.index}]|"
									th:value="${question.optionA}" />
								<span th:text="${question.optionA}"></span>
							</label>
						</div>
						<div class="option">
							<label>
								<input type="radio"
									th:name="|answers[${stat.index}]|"
									th:value="${question.optionB}" />
								<span th:text="${question.optionB}"></span>
							</label>
						</div>
						<div class="option">
							<label>
								<input type="radio"
									th:name="|answers[${stat.index}]|"
									value="SKIPPED_BY_USER" />
								<span class="skip-option">Skip</span>
							</label>
						</div>
					</div>

					<div th:unless="${question.questionType.name() == 'GENDER'}" class="text-answer">
						<input class="text-input" type="text"
							th:name="|answers[${stat.index}]|"
							th:id="|answer-${stat.index}|"
							placeholder="Type your answer here"
							pattern="^[\p{Letter}_\s]+$"
							title="Letters and Spaces only" />
						<div class="skip-row">
							<a href="#" class="skip-link"
								th:attr="onclick=|skipQuestion(${stat.index}); return false;|">
								Skip
							</a>
						</div>
					</div>
				</div>

				<div class="submit-row">
					<button class="submit-btn" type="submit">Submit Test</button>
				</div>

			</form>
		</div>
	</div>

	<footer>Academi Gymraeg</footer>

	<script>
	//reload page if restored from clicking back in the browser
	window.addEventListener("pageshow", function (event) {
		if (event.persisted) {
			window.location.reload();
		}
	});
	
		const SKIPPED_VALUE = "SKIPPED_BY_USER";

		function skipQuestion(index) {
			const input = document.getElementById("answer-" + index);
			const card = document.getElementById("question-card-" + index);

			if (card) {
				card.classList.remove("unanswered");
			}

			if (input) {
				input.value = SKIPPED_VALUE;
			}
		}

		function validateBeforeSubmit() {
			const questionCards = document.querySelectorAll(".question-card");
			let firstUnansweredCard = null;
			let skippedCount = 0;

			questionCards.forEach(card => card.classList.remove("unanswered"));

			for (let i = 0; i < questionCards.length; i++) {
				const card = questionCards[i];
				const inputs = document.getElementsByName("answers[" + i + "]");

				if (!inputs || inputs.length === 0) {
					continue;
				}

				let answerValue = null;
				const firstInput = inputs[0];

				if (firstInput.type === "radio") {
					for (let j = 0; j < inputs.length; j++) {
						if (inputs[j].checked) {
							answerValue = inputs[j].value;
							break;
						}
					}
				} else {
					answerValue = firstInput.value;
				}

				if (answerValue == null || answerValue.trim() === "") {
					card.classList.add("unanswered");
					if (!firstUnansweredCard) {
						firstUnansweredCard = card;
					}
				} else if (answerValue.trim().toUpperCase() === SKIPPED_VALUE) {
					skippedCount++;
				}
			}

			if (firstUnansweredCard) {
				alert("Please answer or skip all questions before submitting.");
				firstUnansweredCard.scrollIntoView({ behavior: "smooth", block: "center" });
				return false;
			}

			if (skippedCount > 0) {
				return confirm("Are you sure you want to submit with skipped questions?");
			}

			return true;
		}
	</script>
</body>
</html>
