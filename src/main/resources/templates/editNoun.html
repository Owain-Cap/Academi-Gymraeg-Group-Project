<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<title>Edit Noun</title>
<link href="/styles/style.css" rel="stylesheet">
<style>
body {
    background: var(--bg);
    color: var(--text);
}

.page {
    flex: 1;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 48px 24px 64px;
}

.container {
    width: 100%;
    max-width: 520px;
}

.page-heading {
    font-family: "Fraunces", serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
}

.page-message {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 32px;
}

form {
    background: rgba(247, 251, 248, 0.95);
    border-radius: 12px;
    padding: 32px;
    border: 1px solid #e3e8e3;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
}

.field {
    display: flex;
    flex-direction: column;
    margin-bottom: 20px;
}

label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
    letter-spacing: 0.02em;
}

input, select {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    background: #fefefe;
    color: var(--text);
    transition: border-color 0.2s, box-shadow 0.2s;
}

input:focus, select:focus {
    outline: none;
    border-color: var(--green-mid);
    box-shadow: 0 0 0 3px rgba(45, 90, 39, 0.12);
}

input[readonly] {
    background: #f1f3f5;
    border-color: #dee2e6;
    color: #5c6f87;
    cursor: default;
}

/* BUTTON ROW — mimics submit-row but with multiple actions */
.button-row {
    display: flex;
    justify-content: flex-end;
    gap: 16px;
    margin-top: 24px;
}

.btn {
    padding: 13px 28px;
    border-radius: 40px;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
    border: none;
    display: inline-block;
    text-decoration: none;
    text-align: center;
    background: transparent;
}

.btn-save {
    background: rgba(31, 61, 43, 0.95);
    color: white;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.15);
}

.btn-save:hover {
    background: var(--green-mid);
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.2);
}

.btn-delete {
    background: rgba(220, 38, 38, 0.9);
    color: white;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
}

.btn-delete:hover {
    background: var(--red-dark);
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
}

.btn-cancel {
    background: #eef2f0;
    color: var(--text);
    border: 1px solid var(--border);
}

.btn-cancel:hover {
    background: #e2e8e3;
    transform: translateY(-1px);
}


.pattern-hint {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
}
</style>
</head>
<body>

<div class="topbar">
    <a class="nav-logo">Academi <em>Gymraeg</em></a>
</div>

<div class="page">
    <div class="container">

        <h1 class="page-heading" th:text="${isNew} ? 'Add New Noun' : 'Edit Noun'">Edit Noun</h1>
        <p class="page-message" th:text="${isNew} ? 'Enter the new noun details below.' : 'Update the noun details below.'">
            Update the noun information below.
        </p>

        <form th:action="@{/nouns/save}" th:object="${noun}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <input type="hidden" th:field="*{nounId}" />

            <div class="field" th:if="${!isNew}">
                <label>Noun ID</label>
                <input type="text" th:field="*{nounId}" readonly />
            </div>

            <div class="field">
                <label for="english">English</label>
                <input type="text" id="english" th:field="*{english}" placeholder="Enter English"
                       pattern="[A-Za-z\s]+" title="Letters only" required />
                <div class="pattern-hint">Letters and spaces only.</div>
            </div>

            <div class="field">
                <label for="welsh">Welsh</label>
                <input type="text" id="welsh" th:field="*{welsh}" placeholder="Enter Welsh"
                       pattern="[a-zA-ZáéíóúŵẃỳÁÉÍÓÚŴẂỲ]+" title="Letters only" required />
                <div class="pattern-hint">Welsh characters allowed.</div>
            </div>

            <div class="field">
                <label for="gender">Gender</label>
                <select id="gender" th:field="*{gender}" required>
                    <option value="MASCULINE">Masculine</option>
                    <option value="FEMININE">Feminine</option>
                </select>
            </div>

            <div class="button-row">
                <button type="button" th:if="${!isNew}" class="btn btn-delete" onclick="confirmDelete()">Delete</button>
                <a th:href="@{/nouns}" class="btn btn-cancel" style="line-height: 1.2;">Cancel</a>
                <button type="submit" class="btn btn-save">Save</button>
            </div>
        </form>

        <div class="back-link">
            <a th:href="@{/nouns}">Back to nouns list</a>
        </div>

    </div>
</div>

<footer>Academi Gymraeg</footer>

<!-- This section is the browser pop up to confirm choice to delete -->
<script th:inline="javascript">
	function confirmDelete() {
		var nounId = /*[[${noun.nounId}]]*/0;
		if (confirm("Are you sure you want to delete this noun?")) {
			var form = document.createElement('form');
			form.method = 'post';
			form.action = '/nouns/delete/' + nounId;

			
			document.body.appendChild(form);
			form.submit();
		} else {
			window.location.href = '/nouns';
		}
	}
</script>

</body>
</html>
