<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<title>Edit Noun</title>
<style>
h1 {
	text-align: center;
}

form {
	width: 50%;
	margin: auto;
	border: 1px solid black;
	padding: 20px;
	box-sizing: border-box;
}

label {
	display: block;
	margin-top: 20px;
	margin-bottom: 5px;
}

input, select {
	width: 100%;
	padding: 8px;
	font-size: 14px;
	border-radius: 5px;
	border: 1px solid black;
	box-sizing: border-box;
}

a {
	text-decoration: none;
}

.button-container {
	text-align: center;
	margin-top: 30px;
}

.save {
	background-color: #4CAF50;
	color: white;
	padding: 10px 20px;
	border-radius: 5px;
	border: 1px solid black;
}

.delete {
	background-color: #e74c3c;
	color: white;
	padding: 10px 20px;
	border-radius: 5px;
	border: 1px solid black;
}

.cancel {
	padding: 10px 20px;
	border-radius: 5px;
	border: 1px solid black;
}
</style>
</head>
<body>
	<h1 th:text="${isNew} ? 'Add New Noun' : 'Edit Noun'">Edit Noun</h1>

	<form th:action="@{/nouns/save}" th:object="${noun}" method="post">
		<input type="hidden" th:name="${_csrf.parameterName}"
			th:value="${_csrf.token}" /> <input type="hidden"
			th:field="*{nounId}" /> <label>Noun ID:</label> <input type="text"
			th:field="*{nounId}" readonly th:if="${!isNew}" /> <label>English:</label>
		<input type="text" th:field="*{english}" placeholder="Enter English"
			pattern="[A-Za-z\s]+" title="Letters only" required /> <label>Welsh:</label>
		<input type="text" th:field="*{welsh}" placeholder="Enter Welsh"
			pattern="[a-zA-ZáéíóúŵẃỳÁÉÍÓÚŴẂỲ]+" title="Letters only" required /> <label>Gender:</label>
		<select th:field="*{gender}" required>
			<option value="MASCULINE">Masculine</option>
			<option value="FEMININE">Feminine</option>
		</select>

		<div class="button-container">
			<button type="button" th:if="${!isNew}" class="delete"
				onclick="confirmDelete()">Delete</button>

			<a th:href="@{/nouns}">
				<button type="button" class="cancel">Cancel</button>
			</a>

			<button type="submit" class="save">Save</button>
		</div>
	</form>

	<!-- This section is the browser pop up to confirm choice to delete -->
	<script th:inline="javascript">
		function confirmDelete() {
			var nounId = /*[[${noun.nounId}]]*/0;
			if (confirm("Are you sure you want to delete this noun?")) {
				var form = document.createElement('form');
				form.method = 'post';
				form.action = '/nouns/delete/' + nounId;

				var csrfParam = /*[[${_csrf.parameterName}]]*/'_csrf';
				var csrfToken = /*[[${_csrf.token}]]*/'';
				var csrfInput = document.createElement('input');
				csrfInput.type = 'hidden';
				csrfInput.name = csrfParam;
				csrfInput.value = csrfToken;
				form.appendChild(csrfInput);

				document.body.appendChild(form);
				form.submit();
			} else {
				window.location.href = '/nouns';
			}
		}
	</script>

</body>
</html>
